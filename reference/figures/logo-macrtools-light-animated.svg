<clipPath id="inner"><path d="M200,14 L388,122 L388,340 L200,448 L12,340 L12,122 Z"/></clipPath><style>@keyframes rv0{0%,44.9%{opacity:0}49.9%{opacity:1.0}90%{opacity:1.0}100%{opacity:0}}@keyframes rv1{0%,46.1%{opacity:0}51.1%{opacity:1.0}90%{opacity:1.0}100%{opacity:0}}@keyframes rv2{0%,47.2%{opacity:0}52.2%{opacity:1.0}90%{opacity:1.0}100%{opacity:0}}@keyframes rv3{0%,48.4%{opacity:0}53.4%{opacity:1.0}90%{opacity:1.0}100%{opacity:0}}@keyframes rv4{0%,49.6%{opacity:0}54.6%{opacity:1.0}90%{opacity:1.0}100%{opacity:0}}@keyframes rv5{0%,50.7%{opacity:0}55.7%{opacity:1.0}90%{opacity:1.0}100%{opacity:0}}@keyframes rv6{0%,51.9%{opacity:0}56.9%{opacity:1.0}90%{opacity:1.0}100%{opacity:0}}@keyframes rv7{0%,53.0%{opacity:0}58.0%{opacity:1.0}90%{opacity:1.0}100%{opacity:0}}@keyframes rv8{0%,54.2%{opacity:0}59.2%{opacity:1.0}90%{opacity:1.0}100%{opacity:0}}@keyframes pulse{0%,42%{opacity:0.0}52%{opacity:0.6}60%{opacity:0.2}80%,100%{opacity:0.0}}@keyframes sweep{0%{transform:translateY(-170px);opacity:0}5%{opacity:.55}90%{opacity:.55}100%{transform:translateY(520px);opacity:0}}.hatch line:nth-child(1){animation:rv0 3.4s linear infinite}.hatch line:nth-child(2){animation:rv1 3.4s linear infinite}.hatch line:nth-child(3){animation:rv2 3.4s linear infinite}.hatch line:nth-child(4){animation:rv3 3.4s linear infinite}.hatch line:nth-child(5){animation:rv4 3.4s linear infinite}.hatch line:nth-child(6){animation:rv5 3.4s linear infinite}.hatch line:nth-child(7){animation:rv6 3.4s linear infinite}.hatch line:nth-child(8){animation:rv7 3.4s linear infinite}.hatch line:nth-child(9){animation:rv8 3.4s linear infinite}.rfx{animation:pulse 3.4s ease-in-out infinite}.scan{animation:sweep 3.4s ease-in-out infinite}@media (prefers-reduced-motion: reduce){.hatch line,.rfx,.scan{animation:none}.hatch line{opacity:1.0}.rfx{opacity:0.30}.scan{opacity:0}}</style></defs>
